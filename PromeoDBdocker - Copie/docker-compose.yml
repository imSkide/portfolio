version: "3.9"

services:
  database:
    image: mariadb:11.8
    container_name: dbPromeo
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    restart: always
  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8082:80"
    environment:
      - PMA_HOST=database
    depends_on:
      - database
